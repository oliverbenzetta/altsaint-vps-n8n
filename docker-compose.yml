# Container Name: N8N (Staging Environment)
# File Name: docker-compose.yml
# Description: Docker Compose configuration for the N8N workflow automation platform, including PostgreSQL and Qdrant.
# Docker Internal Network: altsaint-net
# Version: 1.1.0
# Author: Alt Saint Group LTD

networks:
  altsaint-net:
    # Define the internal network for inter-service communication
    name: altsaint-net
    external: true

services:
  # PostgreSQL database service for N8N
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-postgres
    restart: unless-stopped
    # Use the UID/GID from the .env file for volume permissions
    user: "${UID}:${GID}"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./service-data/postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    networks:
      - altsaint-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Qdrant vector store service
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ${COMPOSE_PROJECT_NAME}-qdrant
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=${TZ}
    ports:
      - "${QDRANT_HOST_PORT}:6333"
    volumes:
      - ./service-data/qdrant-storage:/qdrant/storage
      - ./service-data/qdrant-snapshots:/qdrant/snapshots
    networks:
      - altsaint-net

  # Redis para Memoria de Agentes de IA
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - altsaint-net
    volumes:
      - ./service-data/redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # N8N MCP Server
  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: ${COMPOSE_PROJECT_NAME}-mcp
    restart: unless-stopped
    environment:
      # Conexión dinámica asegurada al contenedor n8n de staging
      - N8N_API_URL=http://${COMPOSE_PROJECT_NAME}:5678/api/v1
      - N8N_API_KEY=${MCP_N8N_API_KEY}
      - MCP_MODE=http
      - AUTH_TOKEN=${MCP_AUTH_TOKEN}
    ports:
      - "${MCP_PORT}:3000"
    networks:
      - altsaint-net
    depends_on:
      n8n:
        condition: service_started

  # N8N core service
  n8n:
    # image: n8nio/n8n:2.15.0 
    image: n8nio/n8n:2.10.0
    container_name: ${COMPOSE_PROJECT_NAME}
    ports:
      - "${N8N_IP_HOST_PORT}:5678"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=${TZ}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}

      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - N8N_API_BASE_URL=${N8N_API_BASE_URL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS}
      - N8N_TRUSTED_PROXIES=${N8N_TRUSTED_PROXIES}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}

      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=${N8N_BLOCK_ENV_ACCESS_IN_NODE}
      - N8N_GIT_NODE_DISABLE_BARE_REPOS=${N8N_GIT_NODE_DISABLE_BARE_REPOS}
      - N8N_RUNNERS_ENABLED=${N8N_RUNNERS_ENABLED}

      # Base de datos conectada dinámicamente
      - DB_TYPE=${DB_TYPE}
      - DB_POSTGRESDB_HOST=${COMPOSE_PROJECT_NAME}-postgres
      - DB_POSTGRESDB_PORT=${DB_PORT}
      - DB_POSTGRESDB_DATABASE=${DB_NAME}
      - DB_POSTGRESDB_USER=${DB_USER} 
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}

      # Qdrant conectado dinámicamente
      - QDRANT_BASE_URL=http://${COMPOSE_PROJECT_NAME}-qdrant:6333

      # Redis conectado dinámicamente
      - REDIS_HOST=${COMPOSE_PROJECT_NAME}-redis
      - REDIS_PORT=${REDIS_PORT}

    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./service-data/n8n-data:/home/node/.n8n
      - ./service-data/n8n-shared:/files
      - ./service-data/backups:/home/node/backups
    networks:
      - altsaint-net